name: Compile Cookbook

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_cookbook:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX (with Polish Language Support)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc \
            texlive-latex-recommended \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-extra-utils \
            texlive-latex-extra \
            texlive-lang-polish  # <--- Added this to fix the babel error

      - name: Compile Cookbook PDF
        run: |
          # Find all markdown files, sort them, but explicitly filter out the README.md
          MAP_FILES=$(find . -name "*.md" ! -name "README.md" | sort)
          
          echo "Files to compile:"
          echo "$MAP_FILES"
          
          # Run Pandoc
          pandoc conf.yaml $MAP_FILES -o zgadza-sie-ukradlem-cookbook.pdf --pdf-engine=xelatex --net-fetch

      - name: Generate Date and Tag Context
        run: |
          echo "RELEASE_TAG=v$(date +'%y.%m.%d')" >> $GITHUB_ENV
          echo "RELEASE_TITLE=Wydanie z dnia $(date +'%d.%m.%Y')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body: "Automatyczna kompilacja książki kucharskiej na podstawie najnowszych zmian w repozytorium."
          artifacts: "zgadza-sie-ukradlem-cookbook.pdf"